# Planetenschalen: Ton + traditionelle thematische Zuordnung je Planet.
# Frank: "bei Planetenschalen setzt es an dem, was in den Schalen drin ist" -
# der Planetenton bestimmt mit, welche Wirkung/welches Thema der Titel anspricht.
#
# WICHTIG (Evidence-First): die Frequenz-/Ton-Werte sind NICHT verifiziert und
# wurden bewusst NICHT erfunden. Quelle ist die Kosmische Oktave (Hans Cousto)
# bzw. Franks bestehende Produktdaten. Vor Nutzung: gepruefte Werte einsetzen.
# Die thematischen Zuordnungen sind TRADITIONELL (astrologisch/kulturell), keine
# Heilaussagen (HWG): bewusst als Stimmung/Thema formuliert, nicht als Koerperwirkung.
schema_version: 0   # 0 = Struktur steht, Daten unvollstaendig/ungeprueft
stand: 2026-06-09
status: ENTWURF_WERTE_PRUEFEN

